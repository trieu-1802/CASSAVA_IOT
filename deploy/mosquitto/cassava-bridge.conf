# Mosquitto bridge: pi3 (local) <-> prod broker (112.137.129.218)
#
# Install on pi3 as: /etc/mosquitto/conf.d/cassava-bridge.conf
# Then: sudo systemctl restart mosquitto
#
# Topology (see deploy/MQTT.md §11):
#   - pi3 mosquitto is the LOCAL broker. Edge programs (sensor publishers,
#     dk_bom_mqtt, edge_to_mongo_*) connect to localhost:1883 here.
#   - prod broker (112.137.129.218:1883) is the REMOTE broker. The Spring Boot
#     BE on the prod host connects to its own loopback (127.0.0.1:1883) which
#     IS that remote broker.
#   - This bridge forwards:
#       * cmd  prod -> pi3   (BE publishes, edge wants to receive)
#       * ack  pi3  -> prod  (edge publishes, BE wants to receive)
#       * sensor pi3 -> prod (sensor publishers feed BE's MqttSensorListener
#                             AND the edge_to_mongo_* binaries on the prod host)
#
# Direction reference (mosquitto syntax):
#   topic <pattern> in  <qos>  = subscribe on REMOTE, deliver to LOCAL
#   topic <pattern> out <qos>  = subscribe on LOCAL, deliver to REMOTE

connection cassava-prod
address 112.137.129.218:1883

# Auth on the remote broker (matches mqtt.operation.{username,password}
# in cassavaBE/src/main/resources/application-prod.properties).
remote_username libe
remote_password 123456

# Bridge identity. Must be unique on each broker — do NOT reuse
# `cassava-be-prod` (the BE's client-id on the remote broker) or any client-id
# that local edge programs use on this broker.
remote_clientid pi3-bridge
local_clientid  cassava-prod-bridge

# Survive restarts so QoS 1 messages are redelivered after a reconnect.
cleansession false
try_private false
notifications true
start_type automatic
keepalive_interval 60

# ---------------------------------------------------------------------------
# Operation pipeline (irrigation cmd / ack)
# ---------------------------------------------------------------------------

# BE -> edge: pull command messages from remote into pi3
topic cassava/field/+/valve/+/cmd in 1

# edge -> BE: push ack messages from pi3 to remote
topic cassava/field/+/valve/+/ack out 1

# ---------------------------------------------------------------------------
# Sensor pipeline (weather + per-field soil moisture)
#   Edge sensor publishers run on pi3 and publish locally.
#   The remote broker (prod) is where the BE listens for anomaly checks AND
#   where edge_to_mongo_* binaries run for persistence.
# ---------------------------------------------------------------------------

topic /sensor/weatherStation2 out 1
topic field1                  out 1
topic field2                  out 1
topic field3                  out 1
topic field4                  out 1
