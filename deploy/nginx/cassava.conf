# Nginx site config cho Cassava IoT
# Đặt tại: /etc/nginx/sites-available/cassava
# Symlink: ln -s /etc/nginx/sites-available/cassava /etc/nginx/sites-enabled/
#
# Cấu trúc webroot trên server:
#   /opt/cassava/webroot/
#   ├── index.html          (landing page)
#   ├── assets/
#   │   └── logo-uet.png
#   └── cassava/            (CassavaFE build output — chính là dist/)
#       ├── index.html
#       ├── assets/
#       └── ...

server {
    listen 80 default_server;
    server_name _;

    root /opt/cassava/webroot;
    index index.html;

    # Giới hạn upload body (phòng khi tương lai cần upload ảnh disease)
    client_max_body_size 10M;

    # --- Cassava API: proxy tới Spring Boot chạy ở 127.0.0.1:8081 ---
    # Trailing slash trong proxy_pass sẽ strip prefix /cassava/api/
    # Ví dụ: /cassava/api/mongo/field  →  http://127.0.0.1:8081/mongo/field
    location /cassava/api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mô phỏng có thể chạy lâu → timeout rộng
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- CassavaFE SPA ---
    # try_files fallback về /cassava/index.html cho client-side routing
    location /cassava/ {
        try_files $uri $uri/ /cassava/index.html;
    }

    # --- Landing page (root) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static asset lâu hơn
    location ~* \.(?:png|jpg|jpeg|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
