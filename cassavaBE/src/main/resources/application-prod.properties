# Production profile — activate với: --spring.profiles.active=prod
# Hoặc env SPRING_PROFILES_ACTIVE=prod

# Bind loopback only; public traffic đi qua nginx reverse proxy
server.address=127.0.0.1
server.port=8081

# Async + MongoDB giữ như base
spring.mvc.async.request-timeout=600000
spring.data.mongodb.uri=mongodb://admin:uet%402026@112.137.129.218:27017/iot_agriculture?authSource=admin
spring.data.mongodb.auto-index-creation=false

# Logging production — ghi ra file, ít verbose hơn
logging.file.name=/var/log/cassava/app.log
logging.level.root=INFO
logging.level.com.example.demo=INFO

# Operation MQTT broker (commands → edge / acks ← edge)
# Server runs mosquitto on loopback; pi3 connects via outbound to public IP
mqtt.operation.broker-url=tcp://127.0.0.1:1883
mqtt.operation.client-id=cassava-be-prod
mqtt.operation.username=libe
mqtt.operation.password=123456
mqtt.operation.ack-timeout-seconds=60

# Sensor MQTT (shares operation broker; topics for weather + per-field soil moisture)
mqtt.sensor.weather-topic=/sensor/weatherStation2
mqtt.sensor.soil-topics=field1,field2,field3,field4,field2.1,field4.1

# Anomaly detection — Seasonal Z-score (per sensorId, bucketed by hour-of-day in UTC)
# Best-performing detector per ml-service benchmark (F1=0.948 at k=3, see ml-service/docs/comparison-results.md)
anomaly.zscore.k=3.0
anomaly.zscore.history-days=30
anomaly.zscore.min-samples-per-bucket=10
anomaly.zscore.sensors=temperature,relativeHumidity,rain,radiation,wind,humidity30,humidity60
anomaly.zscore.refit-cron=0 30 2 * * *
